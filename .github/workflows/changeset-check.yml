name: Changeset Check

# src/** に変更がある PR には changeset を必須化する。
# 変更が無い、または `skip-changeset` ラベルが付いた PR はスキップ。

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    # changesets/action が作る "Version Packages" PR 自体は changeset を消費するため除外。
    if: ${{ !startsWith(github.head_ref, 'changeset-release/') }}
    steps:
      - name: skip-changeset ラベル判定
        id: label
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | grep -q '"skip-changeset"'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.label.outputs.skip == 'true'
        run: echo "skip-changeset ラベル付きのため changeset チェックを省略します"

      - if: steps.label.outputs.skip == 'false'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - if: steps.label.outputs.skip == 'false'
        uses: pnpm/action-setup@v6

      - if: steps.label.outputs.skip == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: "pnpm"

      - if: steps.label.outputs.skip == 'false'
        run: pnpm install --frozen-lockfile --prefer-offline

      - if: steps.label.outputs.skip == 'false'
        name: src/** の変更有無を判定
        id: diff
        run: |
          # PR の base..head 差分に src/ 配下の変更があるか確認。
          # 無ければ changeset は不要 (docs / CI 専用の PR)。
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          if git diff --name-only "$BASE" "$HEAD" | grep -q '^src/'; then
            echo "needs=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.label.outputs.skip == 'false' && steps.diff.outputs.needs == 'false'
        run: echo "src/** に変更が無いため changeset は不要です"

      - if: steps.label.outputs.skip == 'false' && steps.diff.outputs.needs == 'true'
        name: changeset の存在確認
        run: |
          # changeset status --since=base は base 以降に追加された .changeset/*.md を要求する。
          # 0 件なら exit 1 で CI を落とす。
          BASE_REF=origin/${{ github.event.pull_request.base.ref }}
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
          pnpm changeset status --since="$BASE_REF"
