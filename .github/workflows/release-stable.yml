name: Release Stable

# 正式な latest リリースと「Version Packages」PR の自動管理を担う。
#
# main への push のたびに changesets/action を走らせ、その二段構えの挙動を利用する:
#   - pending changeset があるとき (= 通常の feature マージ後):
#       「Version Packages」PR を作成 / 更新するだけで publish はしない。
#       同じ push で release.yml (canary) が snapshot を公開するため、
#       feature マージ時に「canary 公開」と「バージョンアップ PR 作成」が同時に起きる。
#   - pending changeset が 0 件のとき (= その Version PR をマージした後):
#       `pnpm release` (changeset publish, latest タグ) を実行して正式公開する。
#       このとき canary (release.yml) はバンプ対象が無いため no-op で終わる。
#
# workflow_dispatch は手動で再実行したいときのフォールバックとして残す。
on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  # release.yml (canary) と同じグループ名で直列化する
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # デフォルトの GITHUB_TOKEN で作成した PR は他ワークフロー (release-dry-run.yml など)
          # を起動しない仕様のため、PAT 経由で checkout / changesets/action を動かす。
          # 公式: https://github.com/changesets/action#with-publishing
          token: ${{ secrets.RELEASE_PAT }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile --prefer-offline
      # publish 時に dist が必要なので build する。typecheck / test は CI で通過済み前提
      - run: pnpm build
      # pending changeset があれば Version PR を作成 / 更新し、0 件なら pnpm release で latest 公開する。
      # changesets/action がこの分岐を自動判定するため、if での push 種別の絞り込みは不要。
      - name: バージョン更新PRの作成 または npm 公開
        uses: changesets/action@v1
        with:
          publish: "pnpm release"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # actions/setup-node が生成する .npmrc の _authToken 変数展開はこの変数名を見る。
          # NPM_TOKEN だけでは展開されず未認証になり、scoped package への publish が
          # （401/403 ではなく）E404 として失敗する（2026-07-10 確認、詳細は CLAUDE.md 参照）。
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # npm provenance を有効化（permissions.id-token: write と連動）
          NPM_CONFIG_PROVENANCE: "true"
