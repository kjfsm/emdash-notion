name: Release Stable

# 正式な latest リリース。日常の main 追従は release.yml (canary) が自動で担うため、
# こちらは routine では発火せず、メンテナが意図したタイミングでのみ動かす。
#
# 運用手順:
#   1. workflow_dispatch で起動する。pending changeset があれば
#      changesets/action が「Version Packages」PR を作成する。
#   2. その PR をレビュー・マージする (通常の PR マージ、追加操作は不要)。
#   3. マージ push のコミットメッセージが "Version Packages" で始まるため、
#      下記 push トリガーの if 条件にマッチしてこのワークフローが再度走り、
#      pending changeset が 0 件になっているため changesets/action が
#      `pnpm release` (= changeset publish, latest タグ) を実行する。
on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  # release.yml (canary) と同じグループ名で直列化する
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    # push イベントでは "Version Packages" マージ push でのみ動かす。
    # 通常の feature マージ push はここで弾かれ、canary (release.yml) だけが走る。
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.head_commit.message, 'Version Packages')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # デフォルトの GITHUB_TOKEN で作成した PR は他ワークフロー (release-dry-run.yml など)
          # を起動しない仕様のため、PAT 経由で checkout / changesets/action を動かす。
          # 公式: https://github.com/changesets/action#with-publishing
          token: ${{ secrets.RELEASE_PAT }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile --prefer-offline
      # publish 時に dist が必要なので build する。typecheck / test は CI で通過済み前提
      - run: pnpm build
      - name: バージョン更新PRの作成 または npm 公開
        uses: changesets/action@v1
        with:
          publish: "pnpm release"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # npm provenance を有効化（permissions.id-token: write と連動）
          NPM_CONFIG_PROVENANCE: "true"
