name: Release Canary

# main への push (= feature PR のマージ) のたびに、Version Packages PR を経由せず
# pending changeset の内容から snapshot バージョン (0.0.0-canary-<sha>) を組み立てて
# `canary` dist-tag で npm publish する。
#
# - pending changeset を消費・削除しない (次の正式リリース判断のためにそのまま残す)
# - Version PR も git tag も作らないため RELEASE_PAT は不要 (default token で足りる)
# - 「Version Packages」PR の作成/更新と正式な latest 公開は release-stable.yml が担う
#   (同じ main push で並走し、feature マージ時は canary 公開と Version PR 作成が同時に起きる)
on:
  push:
    branches:
      - main

concurrency:
  # release-stable.yml と同じグループ名にして直列化する
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # snapshot バージョン名の {commit} 解決に必要
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile --prefer-offline
      # pending changeset が無い push（= Version Packages PR のマージ）を検出する。
      # WHY: 誤った想定だった旧コメントは「pending changeset が 0 件なら version:snapshot は
      # 何もバンプせず、release:snapshot も publish 対象なしで no-op 終了する (安全)」だったが、
      # 実際には pending changeset が 0 件でも version:snapshot は package.json の「正式な」
      # バージョン（例 0.3.1）をそのまま素通りさせ、release:snapshot がそれを canary タグで
      # publish してしまう。すると正式なバージョン番号が registry に「存在する」扱いになり、
      # 以後 release-stable.yml の `changeset publish`（正式 latest 公開）が
      # 「既に公開済み」と判断して恒久的に no-op になる（2026-07-10 実際に発生・確認、
      # 詳細は CLAUDE.md の確認済みの技術メモ参照）。pending changeset が無い push では
      # canary ジョブ自体を丸ごとスキップし、正式公開は release-stable.yml だけに委ねる。
      - name: pending changeset の有無を確認
        id: changesets
        run: |
          if find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | grep -q .; then
            echo "has_pending=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pending=false" >> "$GITHUB_OUTPUT"
          fi
      # publish 時に dist が必要なので build する。typecheck / test は CI で通過済み前提
      - run: pnpm build
        if: steps.changesets.outputs.has_pending == 'true'
      - run: pnpm version:snapshot
        if: steps.changesets.outputs.has_pending == 'true'
      - name: canary タグで npm 公開
        if: steps.changesets.outputs.has_pending == 'true'
        run: pnpm release:snapshot
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # npm provenance を有効化（permissions.id-token: write と連動）
          NPM_CONFIG_PROVENANCE: "true"
